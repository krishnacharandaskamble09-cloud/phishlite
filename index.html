<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON RACER: ULTRA-RESPONSE BUILD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #webcam { position: absolute; bottom: 20px; right: 20px; width: 180px; border: 2px solid #00ffcc; z-index: 10; transform: scaleX(-1); border-radius: 8px; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; z-index: 5; pointer-events: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        button { padding: 20px 50px; font-size: 1.5rem; cursor: pointer; background: #00ffcc; color: black; border: none; font-weight: bold; border-radius: 50px; }
        .debug { position: absolute; bottom: 20px; left: 20px; color: yellow; font-size: 12px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #00ffcc;">ENGINE TUNED</h1>
        <p>1. Raise BOTH hands to the camera</p>
        <p>2. Spread them apart to go FAST</p>
        <button id="start-btn">START RACE</button>
    </div>

    <div id="hud">
        <h2>POS: <span id="rank">1</span>/2</h2>
        <h1 style="font-size: 3rem;">SPD: <span id="speed">0</span></h1>
    </div>

    <div class="debug">Hand Data: <span id="hand-debug">Waiting...</span></div>

    <video id="webcam" autoplay playsinline></video>
    <div id="container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        let isRunning = false, steer = 0, gas = 0, handCount = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(2000, 100, 0x00ffcc, 0x222222));
        const light = new THREE.DirectionalLight(0xffffff, 2.5);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
        const groundBody = new CANNON.Body({ mass: 0 });
        groundBody.addShape(new CANNON.Plane());
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        function createCar(color, startX) {
            const body = new CANNON.Body({ mass: 150 });
            body.addShape(new CANNON.Box(new CANNON.Vec3(1, 0.5, 2)));
            body.position.set(startX, 1, 0);
            const vehicle = new CANNON.RaycastVehicle({ chassisBody: body });
            const wheelOptions = { radius: 0.5, directionLocal: new CANNON.Vec3(0, -1, 0), axleLocal: new CANNON.Vec3(1, 0, 0), chassisConnectionPointLocal: new THREE.Vector3(), suspensionStiffness: 35 };
            [[1, 1.5], [-1, 1.5], [1, -1.5], [-1, -1.5]].forEach(p => {
                wheelOptions.chassisConnectionPointLocal.set(p[0], 0, p[1]);
                vehicle.addWheel(wheelOptions);
            });
            vehicle.addToWorld(world);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshPhongMaterial({ color }));
            scene.add(mesh);
            return { body, vehicle, mesh };
        }

        const player = createCar(0x00ffcc, 0);
        const ai = createCar(0xff4444, 6);

        function initAI() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });
            hands.onResults(res => {
                handCount = res.multiHandLandmarks ? res.multiHandLandmarks.length : 0;
                if (handCount === 2) {
                    const h1 = res.multiHandLandmarks[0][0], h2 = res.multiHandLandmarks[1][0];
                    steer = (h1.y - h2.y) * 5;
                    // Boosted Gas Logic: Distance between hands determines power
                    let dist = Math.hypot(h1.x - h2.x, h1.y - h2.y);
                    gas = THREE.MathUtils.mapLinear(dist, 0.1, 0.5, 0, 1);
                    document.getElementById('hand-debug').innerText = "2 Hands Active - Gas: " + Math.round(gas*100) + "%";
                } else {
                    document.getElementById('hand-debug').innerText = "Only " + handCount + " hand(s) detected. Need 2 to drive!";
                    steer *= 0.9; gas *= 0.5; 
                }
            });
            new Camera(document.getElementById('webcam'), { onFrame: async () => { await hands.send({image: document.getElementById('webcam')}); }, width: 640, height: 480 }).start();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isRunning) return;
            world.step(1/60);

            // Movement Logic - Applied Engine Force
            const force = (gas * -3500) - 200; // Added -200 "idle" force so it always creeps forward
            player.vehicle.setSteeringValue(steer * 0.4, 0);
            player.vehicle.setSteeringValue(steer * 0.4, 1);
            player.vehicle.applyEngineForce(force, 2);
            player.vehicle.applyEngineForce(force, 3);

            // AI Logic - Moves at steady speed
            ai.vehicle.applyEngineForce(-1500, 2);
            ai.vehicle.applyEngineForce(-1500, 3);

            [player, ai].forEach(c => {
                c.mesh.position.set(c.body.position.x, c.body.position.y, c.body.position.z);
                c.mesh.quaternion.set(c.body.quaternion.x, c.body.quaternion.y, c.body.quaternion.z, c.body.quaternion.w);
                // Reset if falls
                if (c.body.position.y < -5) {
                    c.body.position.set(c.isAI ? 6 : 0, 5, c.body.position.z);
                    c.body.velocity.set(0,0,0);
                }
            });

            camera.position.set(player.body.position.x, player.body.position.y + 6, player.body.position.z + 15);
            camera.lookAt(player.body.position.x, player.body.position.y, player.body.position.z);

            document.getElementById('speed').innerText = Math.abs(Math.round(player.vehicle.currentVehicleSpeedKmHour));
            document.getElementById('rank').innerText = (player.body.position.z < ai.body.position.z) ? "1" : "2";
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            isRunning = true; initAI(); animate();
        });
    </script>
</body>
</html>
